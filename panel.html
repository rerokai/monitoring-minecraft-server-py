<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VPS Metrics Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 40px;
            background: #f0f2f5;
        }
        h1 {
            color: #1e2a3a;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #3498db;
            transition: 0.2s;
        }
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }
        .metric-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1rem;
        }
        .metric-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
        }
        .good { color: #27ae60; }
        .warning { color: #e67e22; }
        .critical { color: #e74c3c; }
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #7f8c8d;
            text-align: center;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        .error-card {
            background: #fff5f5;
            border-left-color: #e74c3c;
        }
        @media (max-width: 700px) {
            body { margin: 20px; }
            .metric-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <h1>📊 VPS Server Metrics</h1>
    <div id="metrics" class="metrics-grid"></div>
    <footer>Data from Prometheus (updates every 30 seconds) | Node Exporter metrics</footer>

    <script>
        const apiUrl = 'http://127.0.0.1:8000/api/metrics';

        function formatValue(value, unit) {
            if (value === null || value === undefined) return 'N/A';
            if (unit === '%') return value.toFixed(1) + '%';
            if (unit === 'days') return value.toFixed(1) + ' days';
            if (unit === 'load') return value.toFixed(2);
            if (unit === 'ctx_sw' || unit === 'forks') return value.toFixed(0) + '/s';
            if (unit === 'tcp') return Math.round(value);
            if (unit === 'fd') return Math.round(value);
            return value;
        }

        function getColorClass(value, type) {
            if (value === null) return '';
            if (type === 'cpu' || type === 'ram' || type === 'disk' || type === 'swap') {
                if (value > 90) return 'critical';
                if (value > 70) return 'warning';
                return 'good';
            }
            return '';
        }

        async function fetchMetrics() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                const metricsDefinitions = [
                    { name: 'CPU Usage', key: 'cpu_usage', unit: '%', type: 'cpu' },
                    { name: 'RAM Usage', key: 'ram_usage', unit: '%', type: 'ram' },
                    { name: 'Disk Usage (/)', key: 'disk_usage', unit: '%', type: 'disk' },
                    { name: 'Swap Usage', key: 'swap_usage', unit: '%', type: 'swap' },
                    { name: 'Uptime', key: 'uptime_days', unit: 'days', type: 'uptime' },
                    { name: 'Load Average (1m)', key: 'load1', unit: 'load', type: 'load' },
                    { name: 'Context Switches', key: 'ctx_switches', unit: 'ctx_sw', type: 'ctx' },
                    { name: 'Forks per second', key: 'forks', unit: 'forks', type: 'forks' },
                    { name: 'TCP Established', key: 'tcp_connections', unit: 'tcp', type: 'tcp' },
                    { name: 'Open FDs', key: 'fd_open', unit: 'fd', type: 'fd' }
                ];

                const container = document.getElementById('metrics');
                container.innerHTML = '';

                let hasAny = false;
                for (const m of metricsDefinitions) {
                    const value = data[m.key];
                    if (value === undefined) continue;
                    hasAny = true;
                    const valueFormatted = formatValue(value, m.unit);
                    const colorClass = getColorClass(value, m.type);
                    const card = document.createElement('div');
                    card.className = 'metric-card';
                    card.innerHTML = `
                        <span class="metric-name">${m.name}</span>
                        <span class="metric-value ${colorClass}">${valueFormatted}</span>
                    `;
                    container.appendChild(card);
                }

                if (!hasAny) {
                    container.innerHTML = '<div class="metric-card error-card">⚠️ No metrics received from backend. Check /api/metrics.</div>';
                }
            } catch (err) {
                document.getElementById('metrics').innerHTML = `<div class="metric-card error-card">❌ Connection error: ${err.message}</div>`;
            }
        }

        fetchMetrics();
        setInterval(fetchMetrics, 30000);
    </script>
</body>
</html>
